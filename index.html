<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub del Cumpleaños de Andy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        /* Fondo de pantalla */
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://t4.ftcdn.net/jpg/04/19/38/47/360_F_419384788_LRXd3XpqTxjnyRLethyithLwPE26ksrv.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* CUADRO DE BIENVENIDA (MODAL) */
        #modal-bienvenida {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .cuadro-info {
            background: #222;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid #e91e63;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 0 30px rgba(233, 30, 99, 0.3);
        }

        .cuadro-info h2 {
            color: white;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .cuadro-info p {
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn-empezar {
            background: #e91e63;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-empezar:hover {
            transform: scale(1.1);
            background: #ff4081;
        }

        /* INTERFAZ PRINCIPAL */
        h1 {
            color: white;
            margin-bottom: 40px;
            font-size: clamp(2rem, 6vw, 3.5rem);
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            font-weight: 900;
        }

        .menu-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 85%;
            max-width: 500px;
        }

        .btn-opcion {
            color: white;
            text-decoration: none;
            padding: clamp(20px, 4vh, 30px);
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.3rem;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .btn-inv { background: linear-gradient(45deg, #e91e63, #ff4081); }
        .btn-esc { background: linear-gradient(45deg, #9c27b0, #ba68c8); }

        .btn-opcion:hover { transform: translateY(-5px); filter: brightness(1.1); }

        /* IFRAME FULLSCREEN */
        #contenedorGenially {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 5000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-volver {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 6000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            border: 1px solid white;
        }

        @media (min-width: 768px) {
            .menu-container { flex-direction: row; max-width: 700px; }
            .btn-opcion { flex: 1; }
        }
    </style>
</head>
<body>

    <!-- Cuadro de Bienvenida -->
    <div id="modal-bienvenida">
        <div class="cuadro-info">
            <h2>¡Hola!</h2>
            <p>Bienvenidos al hub del cumpleaños de Andy.<br>Pulsa empezar para continuar.</p>
            <button class="btn-empezar" onclick="cerrarBienvenida()">EMPEZAR</button>
        </div>
    </div>

    <!-- Música de fondo -->
    <audio id="musica" loop preload="auto" crossorigin="anonymous">
        <source src="https://file.garden/afW_Y0vtaUHOO25a/ElevenLabs_Aventura_Pixel.mp3" type="audio/mpeg">
    </audio>

    <h1>¿QUÉ QUIERES VER?</h1>

    <div class="menu-container">
        <button class="btn-opcion btn-inv" onclick="abrir('https://view.genially.com/69f5b407e5dfae9ae1897d74')">💌 INVITACIÓN</button>
        <button class="btn-opcion btn-esc" onclick="abrir('https://view.genially.com/69f624e1d0a769f8e2813e36')">🎮 ESCAPE ROOM</button>
    </div>

    <div id="contenedorGenially">
        <a href="javascript:cerrar()" class="btn-volver">⬅ VOLVER</a>
        <iframe id="iframeG" src=""></iframe>
    </div>

    <script>
        const audio = document.getElementById('musica');

        window.addEventListener('DOMContentLoaded', () => {
            audio.load();
        });

        function cerrarBienvenida() {
            audio.volume = 1.0;
            audio.play().catch(error => console.log("Audio play failed:", error));
            
            document.getElementById('modal-bienvenida').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('modal-bienvenida').style.display = 'none';
            }, 500);
        }

        function abrir(url) {
            // Pausar música al abrir experiencia
            audio.pause();
            document.getElementById('contenedorGenially').style.display = 'block';
            document.getElementById('iframeG').src = url;
        }

        function cerrar() {
            // Reanudar música al volver al menú
            audio.play().catch(error => console.log("Audio resume failed:", error));
            document.getElementById('contenedorGenially').style.display = 'none';
            document.getElementById('iframeG').src = "";
        }
    </script>
</body>
</html>
