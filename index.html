<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hub del Cumpleaños de Andy</title>
    
    <!-- FAVICON PARA NAVEGADOR -->
    <link rel="icon" type="image/png" href="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png">
    
    <!-- ICONO PARA IPHONE (PANTALLA DE INICIO) -->
    <!-- Añadimos 'rel="apple-touch-icon"' y también una versión precomposed por si acaso -->
    <link rel="apple-touch-icon" href="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png">
    <link rel="apple-touch-icon-precomposed" href="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png">

    <!-- CONFIGURACIÓN APP WEB iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Cumple Andy">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://t4.ftcdn.net/jpg/04/19/38/47/360_F_419384788_LRXd3XpqTxjnyRLethyithLwPE26ksrv.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 40px;
        }

        .logo-vertical {
            width: 220px;
            height: auto;
            filter: drop-shadow(0 5px 20px rgba(0,0,0,0.6));
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            z-index: 100;
            display: block;
        }

        @media (hover: hover) {
            .logo-vertical:hover {
                transform: scale(1.15);
            }
        }

        .logo-vertical:active {
            transform: scale(0.9) !important;
            transition: transform 0.1s;
        }

        .logo-tap-mobile {
            transform: scale(1.3);
        }

        .dedo-indicador {
            position: absolute;
            bottom: 20px;
            right: -60px; 
            font-size: 65px;
            pointer-events: none;
            z-index: 110;
            opacity: 1;
            transition: opacity 0.3s ease;
            animation: pointingIn 0.7s infinite alternate ease-in-out;
        }

        @keyframes pointingIn {
            from { transform: translateX(0); }
            to { transform: translateX(-45px); }
        }

        .ocultar {
            opacity: 0 !important;
        }

        #modal-bienvenida {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
            transition: opacity 0.5s ease;
        }

        .cuadro-info {
            background: #222;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid #00d2ff;
            max-width: 400px;
            width: 90%;
        }

        .btn-empezar {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .menu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            width: 100%;
            max-width: 550px;
            justify-content: center;
            z-index: 10;
        }

        .btn-opcion {
            color: white;
            padding: 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }
        
        .btn-opcion:active { transform: scale(0.95); }

        .btn-inv { background: linear-gradient(45deg, #00d2ff, #3a7bd5); }
        .btn-esc { background: linear-gradient(45deg, #9c27b0, #ba68c8); }
        .btn-git { background: linear-gradient(45deg, #333, #000); border: 1px solid #555; font-size: 0.8rem; margin-top: 5px; }

        #contenedorGenially {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            z-index: 20000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-volver {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 21000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            border-radius: 50px;
            text-decoration: none;
            border: 1px solid white;
        }

        @media (min-width: 768px) {
            .btn-inv, .btn-esc { width: calc(50% - 8px); }
        }
    </style>
</head>
<body>

    <div id="modal-bienvenida">
        <div class="cuadro-info">
            <h2 style="color:white; margin-bottom:20px;">¡Hola!</h2>
            <p style="color:#ccc; margin-bottom:30px;">Bienvenidos al hub del cumpleaños de Andy.</p>
            <button class="btn-empezar" onclick="cerrarBienvenida()">EMPEZAR</button>
        </div>
    </div>

    <div class="logo-wrapper">
        <div id="dedo" class="dedo-indicador">👈</div>
        <img src="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png" 
             alt="Logo" 
             class="logo-vertical" 
             id="logoAndy"
             onclick="lanzarCelebracion()">
    </div>

    <div class="menu-container">
        <button class="btn-opcion btn-inv" onclick="abrir('https://view.genially.com/69f5b407e5dfae9ae1897d74')">💌 INVITACIÓN</button>
        <button class="btn-opcion btn-esc" onclick="abrir('https://view.genially.com/69f624e1d0a769f8e2813e36')">🎮 ESCAPE ROOM</button>
        <button class="btn-opcion btn-git" onclick="window.open('https://github.com/bypssd/cumple/', '_blank')">📂 REPO GITHUB</button>
    </div>

    <audio id="audioConfeti" src="https://file.garden/afW_Y0vtaUHOO25a/confeti.mp3"></audio>

    <div id="contenedorGenially">
        <a href="javascript:cerrar()" class="btn-volver">⬅ VOLVER</a>
        <iframe id="iframeG" src=""></iframe>
    </div>

    <script>
        const audio = document.getElementById('audioConfeti');
        const dedo = document.getElementById('dedo');
        const logo = document.getElementById('logoAndy');

        function lanzarCelebracion() {
            logo.classList.add('logo-tap-mobile');
            setTimeout(() => logo.classList.remove('logo-tap-mobile'), 300);
            dedo.classList.add('ocultar');
            
            audio.currentTime = 0;
            audio.play();

            const duration = 2.5 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 4,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0, y: 0.5 }
                });
                confetti({
                    particleCount: 4,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1, y: 0.5 }
                });
                confetti({
                    particleCount: 2,
                    angle: 90,
                    spread: 100,
                    origin: { x: 0.5, y: 0.3 }
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }

        function cerrarBienvenida() {
            document.getElementById('modal-bienvenida').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('modal-bienvenida').style.display = 'none';
                setTimeout(() => {
                    dedo.classList.add('ocultar');
                }, 3000);
            }, 500);
        }

        function abrir(url) {
            document.getElementById('contenedorGenially').style.display = 'block';
            document.getElementById('iframeG').src = url;
        }

        function cerrar() {
            document.getElementById('contenedorGenially').style.display = 'none';
            document.getElementById('iframeG').src = "";
        }
    </script>
</body>
</html>
