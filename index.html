<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hub del Cumpleaños de Andy</title>
    
    <link rel="icon" type="image/png" href="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png">
    <link rel="apple-touch-icon" href="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00d2ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Cumpleaños de Andy">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            overflow-y: auto;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://t4.ftcdn.net/jpg/04/19/38/47/360_F_419384788_LRXd3XpqTxjnyRLethyithLwPE26ksrv.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .elfsight-app-5493391c-2281-4e7f-ae5a-f7bc28513ca7 {
            width: 100%;
            max-width: 450px;
            margin-bottom: 20px;
        }

        .logo-wrapper {
            position: relative;
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        .logo-vertical {
            width: 50vw;
            max-width: 220px;
            height: auto;
            filter: drop-shadow(0 5px 20px rgba(0,0,0,0.6));
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .logo-vertical:active { transform: scale(0.9); }

        .menu-container {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
            z-index: 10;
            padding-bottom: 100px;
        }

        .btn-opcion {
            color: white;
            padding: 18px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            width: 100%;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-opcion:active { transform: scale(0.95); }
        .btn-inv { background: linear-gradient(45deg, #00d2ff, #3a7bd5); }
        .btn-esc { background: linear-gradient(45deg, #9c27b0, #ba68c8); }
        .btn-git { 
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.2); 
            font-size: 0.8rem; 
            margin-top: 10px;
        }

        /* Botones Flotantes */
        .btn-flotante {
            position: fixed;
            bottom: 20px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            cursor: pointer;
            border: 3px solid white;
            z-index: 999;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-gato-flotante {
            right: 20px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            box-shadow: 0 8px 25px rgba(255, 154, 158, 0.5);
        }

        .btn-musica-flotante {
            left: 20px;
            background: linear-gradient(45deg, #00d2ff, #9cedff);
            box-shadow: 0 8px 25px rgba(0, 210, 255, 0.5);
        }

        /* Reproductor de Música */
        #player-container {
            position: fixed;
            bottom: 100px;
            left: 20px;
            width: 280px;
            background: rgba(34, 34, 34, 0.9);
            backdrop-filter: blur(15px);
            border: 2px solid #00d2ff;
            border-radius: 20px;
            padding: 15px;
            display: none;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            color: white;
        }

        .player-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .close-player { cursor: pointer; color: #ff4b4b; font-size: 1.2rem; }

        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 15px 0;
            cursor: pointer;
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background: #00d2ff;
            border-radius: 10px;
            width: 0%;
        }

        .player-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-size: 1.5rem;
        }

        .control-btn { cursor: pointer; transition: 0.2s; }
        .control-btn:active { transform: scale(0.8); }
        .control-btn.active { color: #00d2ff; }

        /* Estilos base del modal */
        #modal-bienvenida {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000; transition: opacity 0.5s ease;
        }

        .cuadro-info {
            background: #222;
            padding: 30px;
            border-radius: 25px;
            text-align: center;
            border: 2px solid #00d2ff;
            max-width: 350px;
            width: 85%;
        }

        .btn-empezar {
            background: #00d2ff;
            color: #000;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
        }

        #contenedorGenially {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 20000;
        }

        iframe { width: 100%; height: 100%; border: none; }

        .btn-volver {
            position: absolute;
            top: env(safe-area-inset-top, 20px);
            left: 20px;
            z-index: 21000;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            border: 1px solid white;
        }

        @media (min-width: 600px) {
            .btn-inv, .btn-esc { width: calc(50% - 6px); }
        }
    </style>
</head>
<body>

    <div id="modal-bienvenida">
        <div class="cuadro-info">
            <h2 style="color:white; margin-bottom:15px;">¡Hola!</h2>
            <p style="color:#ccc; margin-bottom:25px;">Bienvenidos al hub del cumpleaños de Andy.</p>
            <button class="btn-empezar" onclick="cerrarBienvenida()">EMPEZAR</button>
        </div>
    </div>

    <script src="https://elfsightcdn.com/platform.js" async></script>
    <div class="elfsight-app-5493391c-2281-4e7f-ae5a-f7bc28513ca7" data-elfsight-app-lazy></div>

    <div class="logo-wrapper">
        <img src="https://file.garden/afW_Y0vtaUHOO25a/cumpleandy_logo-vertical.png" 
             alt="Logo" 
             class="logo-vertical" 
             id="logoAndy"
             onclick="lanzarCelebracion()">
    </div>

    <div class="menu-container">
        <button class="btn-opcion btn-inv" onclick="abrir('https://view.genially.com/69f5b407e5dfae9ae1897d74')">💌 INVITACIÓN</button>
        <button class="btn-opcion btn-esc" onclick="abrir('https://view.genially.com/69f624e1d0a769f8e2813e36')">🎮 ESCAPE ROOM</button>
        <button class="btn-opcion btn-git" onclick="window.open('https://github.com/bypssd/cumple/', '_blank')">📂 REPO GITHUB</button>
    </div>

    <div class="btn-flotante btn-musica-flotante" onclick="togglePlayer()">🎵</div>
    <div class="btn-flotante btn-gato-flotante" onclick="miauYJuega()">🐈</div>

    <div id="player-container">
        <div class="player-header">
            <span>ANDY CUMPLE HOY 🎵</span>
            <span class="close-player" onclick="togglePlayer()">×</span>
        </div>
        <div class="progress-container" onclick="seek(event)">
            <div class="progress-bar" id="progress"></div>
        </div>
        <div class="player-controls">
            <div class="control-btn" id="repeat-btn" onclick="toggleRepeat()">🔁</div>
            <div class="control-btn" id="play-pause" onclick="togglePlay()">▶️</div>
            <div class="control-btn" onclick="stopMusic()">⏹️</div>
        </div>
    </div>

    <audio id="audioConfeti" src="https://file.garden/afW_Y0vtaUHOO25a/confeti.mp3"></audio>
    <audio id="audioMiau" src="https://file.garden/afW_Y0vtaUHOO25a/gato-miau.mp3"></audio>
    <audio id="audioPrincipal" src="https://file.garden/afW_Y0vtaUHOO25a/Andy%20Cumple%20Hoy.mp3"></audio>

    <div id="contenedorGenially">
        <a href="javascript:cerrar()" class="btn-volver">⬅ VOLVER</a>
        <iframe id="iframeG" src=""></iframe>
    </div>

    <script>
        const audioC = document.getElementById('audioConfeti');
        const audioM = document.getElementById('audioMiau');
        const audioP = document.getElementById('audioPrincipal');
        const progressBar = document.getElementById('progress');
        const playBtn = document.getElementById('play-pause');
        const repeatBtn = document.getElementById('repeat-btn');
        const player = document.getElementById('player-container');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(err => console.log('SW no registrado', err));
            });
        }

        // --- Funciones de Música ---
        function togglePlayer() {
            player.style.display = (player.style.display === 'block') ? 'none' : 'block';
        }

        function togglePlay() {
            if (audioP.paused) {
                audioP.play();
                playBtn.innerText = '⏸️';
            } else {
                audioP.pause();
                playBtn.innerText = '▶️';
            }
        }

        function stopMusic() {
            audioP.pause();
            audioP.currentTime = 0;
            playBtn.innerText = '▶️';
        }

        function toggleRepeat() {
            audioP.loop = !audioP.loop;
            repeatBtn.classList.toggle('active');
        }

        function seek(event) {
            const container = event.currentTarget;
            const clickX = event.offsetX;
            const width = container.clientWidth;
            const duration = audioP.duration;
            audioP.currentTime = (clickX / width) * duration;
        }

        audioP.ontimeupdate = function() {
            const percent = (audioP.currentTime / audioP.duration) * 100;
            progressBar.style.width = percent + '%';
        };

        audioP.onended = function() {
            if (!audioP.loop) playBtn.innerText = '▶️';
        };

        // --- Funciones Generales ---
        function miauYJuega() {
            audioM.play();
            audioM.onended = function() {
                abrir('https://cumple13.bypssd.com/tarta.html');
            };
        }

        function lanzarCelebracion() {
            audioC.currentTime = 0;
            audioC.play();
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        }

        function cerrarBienvenida() {
            document.getElementById('modal-bienvenida').style.opacity = '0';
            setTimeout(() => { document.getElementById('modal-bienvenida').style.display = 'none'; }, 500);
        }

        function abrir(url) {
            document.getElementById('contenedorGenially').style.display = 'block';
            document.getElementById('iframeG').src = url;
        }

        function cerrar() {
            document.getElementById('contenedorGenially').style.display = 'none';
            document.getElementById('iframeG').src = "";
        }
    </script>
</body>
</html>
